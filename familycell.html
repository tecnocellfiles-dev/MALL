<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyCell | Elite Tech</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="store-page">
    <div class="custom-cursor"></div>

    <nav class="nav-minimal">
        <a href="index.html" class="logo" style="text-decoration:none; color:inherit">LUXURY<span>MALL</span></a>
        <div class="nav-right">
            <button class="cart-trigger" onclick="toggleCart()">
                BAG <span id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <header class="store-hero-v2">
        <div class="hero-titles">
            <h1 class="reveal-text">SISTEMAS</h1>
            <h1 class="reveal-text outline-text">MAESTROS</h1>
        </div>
        <p class="hero-description">Curaduría de hardware de alto rendimiento para la élite digital.</p>
    </header>

    <section class="product-showcase">
        <div class="inventory-header">
            <span>DISPONIBILIDAD: 59 UNIDADES</span>
            <div class="h-line"></div>
        </div>
        <div id="product-grid" class="product-grid-detail"></div>
    </section>

    <aside id="side-cart" class="cart-panel">
        <div class="cart-header">
            <h3>ORDEN</h3>
            <button onclick="toggleCart()" class="close-btn">CLOSE</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
            <div class="total-box">
                <span>TOTAL ESTIMADO</span>
                <span id="cart-total">₡0</span>
            </div>
            <button class="checkout-btn" onclick="sendToWhatsApp()">RESERVAR POR WHATSAPP</button>
        </div>
    </aside>

    <div id="specs-modal" class="modal-blur">
        <div class="modal-card">
            <button onclick="closeSpecs()" class="close-btn-modal">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
