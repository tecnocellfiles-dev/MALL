<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyCell | Luxury Mall</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body class="store-page">

    <nav class="nav-minimal">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">LUXURY<span>MALL</span></a></div>
        <div class="nav-right">
            <button class="cart-trigger" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <header class="store-hero">
        <div class="header-content">
            <span class="tag">FamilyCell Premium Technology</span>
            <h1>SISTEMAS <br>AVANZADOS</h1>
            <p>Hardware de alto rendimiento con garantía directa.</p>
        </div>
    </header>

    <section class="product-showcase">
        <h2 class="section-title">EQUIPOS EN STOCK</h2>
        <div id="product-grid" class="product-grid-detail">
            </div>
    </section>

    <aside id="side-cart" class="cart-panel">
        <div class="cart-header">
            <h2>TU PEDIDO</h2>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items" class="cart-content"></div>
        <div class="cart-footer">
            <div class="total-row"><span>TOTAL</span><span>₡<span id="cart-total">0</span></span></div>
            <button class="checkout-btn" onclick="sendOrder()">PEDIR POR WHATSAPP</button>
        </div>
    </aside>

    <div id="specs-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closeSpecs()">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
