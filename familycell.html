<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyCell | Luxury Tech Experience</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body class="store-page">

    <nav class="nav-minimal">
        <div class="logo">LUXURY<span>MALL</span></div>
        <div class="nav-right">
            <button class="btn-premium" onclick="toggleCart()" style="padding: 8px 20px;">BOLSA (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <header class="store-hero" style="height: 60vh; background: radial-gradient(circle at center, #111 0%, #000 100%); display:flex; align-items:center; justify-content:center; text-align:center;">
        <div class="header-content">
            <span class="category" style="color:var(--accent); letter-spacing:5px">FamilyCell Premium Stock</span>
            <h1 style="font-family:Syncopate; font-size:4rem; margin-top:20px;">SISTEMAS<br>MAESTROS</h1>
        </div>
    </header>

    <section class="product-showcase">
        <h2 class="section-title">EQUIPOS DISPONIBLES</h2>
        <div id="product-grid" class="product-grid-detail"></div>
    </section>

    <aside id="side-cart" class="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px">
            <h2 style="font-family:Syncopate">TU ORDEN</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:2rem; cursor:pointer">✕</button>
        </div>
        <div id="cart-items" style="max-height:60vh; overflow-y:auto"></div>
        <div style="margin-top:auto; padding-top:40px; border-top:1px solid #222">
            <div style="display:flex; justify-content:space-between; font-size:1.5rem; font-weight:900; margin-bottom:30px">
                <span>TOTAL</span><span>₡<span id="cart-total">0</span></span>
            </div>
            <button class="btn-premium" style="width:100%; background:var(--accent); color:#000" onclick="sendToWhatsApp()">FINALIZAR POR WHATSAPP</button>
        </div>
    </aside>

    <div id="specs-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:9999;">
        <div style="background:#0a0a0a; border:1px solid var(--accent); padding:50px; border-radius:30px; position:relative; max-width:500px; width:90%; text-align:center">
            <button onclick="closeSpecs()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
