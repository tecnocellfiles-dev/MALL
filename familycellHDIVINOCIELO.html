<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Mall | Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body class="store-page">
    <div class="grain"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="nav-minimal">
        <a href="index.html" class="logo" style="text-decoration:none; color:#fff">LUXURY<span>MALL</span></a>
        <div class="nav-right">
            <button class="btn-premium" onclick="toggleCart()" style="padding: 8px 20px;">BOLSA (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <header class="store-hero" style="height: 40vh; display:flex; align-items:center; justify-content:center; text-align:center;">
        <h1 id="store-title" style="font-family:Syncopate; font-size:3rem; text-transform:uppercase;">COLECCIÓN ELITE</h1>
    </header>

    <section class="product-showcase">
        <div id="product-grid" class="product-grid-detail"></div>
    </section>

    <aside id="side-cart" class="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px">
            <h2 style="font-family:Syncopate">TU ORDEN</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:2rem; cursor:pointer">✕</button>
        </div>
        <div id="cart-items"></div>
        <div style="margin-top:auto; padding-top:40px; border-top:1px solid #222">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <span>TOTAL</span><span>₡<span id="cart-total">0</span></span>
            </div>
            <button class="btn-premium" style="width:100%; background:var(--accent); color:#000" onclick="sendToWhatsApp()">WHATSAPP</button>
        </div>
    </aside>

    <script src="js/main.js"></script>
</body>
</html>
