<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY MALL | Concept Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain"></div>
    <div id="loader">
        <div class="loader-content">
            <div class="logo">LUXURY<span>MALL</span></div>
            <div class="loader-line"></div>
        </div>
    </div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="nav-minimal">
        <div class="logo">LUXURY<span>MALL</span></div>
    </nav>

    <main class="main-container">
        <section class="store-section tech" onclick="location.href='familycell.html'">
            <div class="section-bg" style="background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=2000');"></div>
            <div class="content">
                <span class="category-tag">THE ATELIER</span>
                <h2>Divino<br><span class="outline-thin">CIELO</span></h2>
                <p class="section-desc">Moda de alta costura y sistemas de vanguardia unificados.</p>
                <div class="modern-link">ENTRAR A LA BOUTIQUE <span class="arrow">→</span></div>
            </div>
        </section>

        <section class="store-section fashion">
            <div class="section-bg" style="background-image: url('https://images.unsplash.com/photo-1581092921461-eab62e92c859?q=80&w=2000');"></div>
            <div class="content">
                <span class="category-tag">THE LABORATORY</span>
                <h2>FamilyCell<br><span class="outline-thin">LABS</span></h2>
                <p class="section-desc">Componentes exóticos y servicios de ingeniería avanzada.</p>
                <div class="modern-link">EXPLORAR LABS <span class="arrow">→</span></div>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
