<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divino Cielo | Boutique</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
</head>
<body class="store-page">
    <div class="grain"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="nav-minimal">
        <a href="index.html" class="logo" style="text-decoration:none; color:#fff">LUXURY<span>MALL</span></a>
        <button class="btn-premium" onclick="toggleCart()">BOLSA (<span id="cart-count">0</span>)</button>
    </nav>

    <header class="store-hero" style="height: 40vh; display:flex; align-items:center; justify-content:center; text-align:center;">
        <h1 id="store-title" style="font-family:Syncopate; font-size:3rem; text-transform:uppercase;">DIVINO CIELO</h1>
    </header>

    <section class="product-showcase">
        <div id="product-grid" class="product-grid-detail"></div>
    </section>

    <aside id="side-cart" class="cart-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:40px">
            <h2 style="font-family:Syncopate">TU SELECCIÓN</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:2rem; cursor:pointer">✕</button>
        </div>
        <div id="cart-items"></div>
        <div style="margin-top:auto; padding-top:40px; border-top:1px solid #222">
            <h3>TOTAL: ₡<span id="cart-total">0</span></h3>
            <button class="btn-premium" style="width:100%; margin-top:20px; background:var(--accent); color:#000" onclick="sendToWhatsApp()">ORDENAR POR WHATSAPP</button>
        </div>
    </aside>

    <script src="js/main.js"></script>
</body>
</html>
