<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divino Cielo — NOMBREPAG</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body data-store="divino">
  <div id="progress-bar"></div>
  <div class="grain"></div>
  <div id="cursor-dot" class="cursor-dot"></div>
  <div id="cursor-ring" class="cursor-ring"></div>

  <nav>
    <a href="index.html" class="nav-logo">NOMBRE<em>PAG</em></a>
    <div class="nav-right">
      <a href="index.html" class="nav-link">← Volver</a>
      <button class="cart-btn" onclick="toggleCart()">BOLSA&nbsp;<span class="cart-count cart-count-badge">0</span></button>
    </div>
  </nav>

  <header class="store-page-hero">
    <div class="store-page-bg" style="background-image:url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600')"></div>
    <div class="store-page-content">
      <p class="store-page-eyebrow">TIENDA DE MODA · Nº 01</p>
      <h1 class="store-page-title" style="font-family:'Playfair Display',serif;">Divino Cielo</h1>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" data-type="all" onclick="filterStore('all','divino')">Todo</button>
    <button class="filter-btn" data-type="moda" onclick="filterStore('moda','divino')">Moda</button>
    <button class="filter-btn" data-type="fragancias" onclick="filterStore('fragancias','divino')">Fragancias</button>
    <button class="filter-btn" data-type="tech" onclick="filterStore('tech','divino')">Tech</button>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Buscar productos..." oninput="onSearch(this.value,'divino')">
    </div>
    <select class="sort-select" onchange="sortProducts(this.value,'divino')">
      <option value="">Ordenar por</option>
      <option value="price-asc">Precio: menor a mayor</option>
      <option value="price-desc">Precio: mayor a menor</option>
      <option value="name">Nombre A–Z</option>
      <option value="newest">Más recientes</option>
    </select>
  </div>

  <div class="products-grid" id="product-grid"></div>

  <section id="recent-views-section" style="display:none;">
    <div class="recent-label">VISTOS RECIENTEMENTE</div>
    <div class="recent-grid"></div>
  </section>

  <footer>
    <div class="footer-logo">NOMBRE<em>PAG</em></div>
    <div class="footer-copy">© 2025 Luxury Mall · San José, Costa Rica</div>
  </footer>

  <div id="product-modal"></div>
  <div id="cart-overlay" class="cart-overlay" onclick="closeCart()"></div>
  <aside id="cart-panel" class="cart-panel">
    <div class="cart-panel-head">
      <div class="cart-panel-title">Tu Selección</div>
      <div class="cart-head-right">
        <button class="cart-clear-btn" onclick="clearCart()">VACIAR</button>
        <button class="cart-close" onclick="closeCart()">✕</button>
      </div>
    </div>
    <div class="cart-items-wrap" id="cart-items-wrap"></div>
    <div class="cart-panel-foot">
      <div id="cart-subtotal-row" style="display:none;">
        <span class="cart-total-label">Subtotal</span>
        <span style="font-size:0.85rem;color:rgba(245,240,232,0.5);font-family:'Bebas Neue';letter-spacing:2px;">₡<span id="cart-total">0</span></span>
      </div>
      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-val">₡<span id="cart-total">0</span></span>
      </div>
      <button class="whatsapp-btn" onclick="sendWhatsApp()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        ORDENAR POR WHATSAPP
      </button>
    </div>
  </aside>

  <button id="back-to-top">↑</button>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
